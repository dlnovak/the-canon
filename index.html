var LISTS = {};
Object.keys(RAW).forEach(function(k){
  LISTS[k] = RAW[k].map(function(t){ return { artist: t[0], album: t[1], year: t[2] }; });
});

/* ---------- state ---------- */
var ledger = {};
var tracksCache = {};
Object.keys(BAKED).forEach(function(k){ tracksCache[k] = BAKED[k]; });

function gd(){ return genre + "|" + decade; }
function akey(a){ return (a.artist + "|" + a.album).toLowerCase(); }
function emptyAlbum(){ return { listened:false, rating:0, notes:"", songs:{}, cd:false, cassette:false, vinyl:false, recommend:false, producer:"" }; }
function getA(k){ return ledger[k] || emptyAlbum(); }
function getS(k,i){ return (getA(k).songs||{})[i] || { done:false, vibes:[], note:"", rating:0, standout:[] }; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function patchAlbum(k, patch){
  var base = emptyAlbum(), cur = getA(k), out = {}, p;
  for(p in base) out[p] = base[p];
  for(p in cur) out[p] = cur[p];
  for(p in patch) out[p] = patch[p];
  ledger[k] = out; scheduleSave();
}
function patchSong(k, i, patch){
  var a = getA(k), na = emptyAlbum(), p;
  for(p in a) na[p] = a[p];
  var songs = {}, s0 = na.songs || {};
  for(p in s0) songs[p] = s0[p];
  var cur = getS(k,i), ns = {};
  for(p in cur) ns[p] = cur[p];
  for(p in patch) ns[p] = patch[p];
  songs[i] = ns; na.songs = songs;
  var tr = tracksCache[k];
  if(tr && tr.length){
    var all = true;
    for(var j=0;j<tr.length;j++){ if(!(songs[j] && songs[j].done)){ all=false; break; } }
    na.listened = all;
  }
  ledger[k] = na; scheduleSave();
}

/* ---------- progress ---------- */
function isDone(k){ return !!getA(k).listened; }
function crateProgress(g,d){
  var list = LISTS[g+"|"+d] || [], n = 0;
  for(var i=0;i<list.length;i++) if(isDone(akey(list[i]))) n++;
  return n;
}
function genreDone(g){
  var n=0; for(var i=0;i<DECADES.length;i++) n += crateProgress(g, DECADES[i]);
  return n;
}
function totalDone(){
  var n=0; for(var i=0;i<GENRES.length;i++) n += genreDone(GENRES[i].id);
  return n;
}

/* ---------- persistence (Firestore) ---------- */
function loadFromCloud(){
  if(!currentUser || !window.CanonFB) return;
  setStatus("loading…");
  window.CanonFB.loadLedger(currentUser).then(function(snap){
    if(snap && snap.exists()){
      var data = snap.data() || {};
      ledger = data.ledger || {};
      // Merge any user-saved tracklists on top of baked ones (baked always win).
      Object.keys(BAKED).forEach(function(k){ tracksCache[k] = BAKED[k]; });
      var savedTracks = data.tracks || {};
      Object.keys(savedTracks).forEach(function(k){ if(!tracksCache[k]) tracksCache[k] = savedTracks[k]; });
    }
    setStatus("");
    render();
  }).catch(function(e){
    setStatus("load failed");
    render();
  });
}
function scheduleSave(){
  if(!currentUser){ return; }
  setStatus("saving…");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    var extra = {};
    Object.keys(tracksCache).forEach(function(k){ if(!BAKED[k]) extra[k] = tracksCache[k]; });
    window.CanonFB.saveLedger(currentUser, { ledger: ledger, tracks: extra, updated: Date.now() })
      .then(function(){ setStatus("saved ✓"); })
      .catch(function(){ setStatus("save failed"); })
      .then(function(){ setTimeout(function(){ setStatus(""); }, 2000); });
  }, 800);
}

/* ---------- auth flow ---------- */
function wireAuth(){
  fbReady = true;
  var gate = document.getElementById("authGate");
  var errEl = document.getElementById("authErr");
  var googleBtn = document.getElementById("googleBtn");

  function friendlyErr(code){
    if(!code) return "Something went wrong. Try again.";
    if(code.indexOf("popup-closed-by-user")>=0 || code.indexOf("cancelled-popup")>=0) return "Sign-in cancelled.";
    if(code.indexOf("popup-blocked")>=0) return "Your browser blocked the popup. Allow popups and try again.";
    if(code.indexOf("unauthorized-domain")>=0) return "This domain isn't authorized in Firebase yet.";
    if(code.indexOf("network")>=0) return "Network problem. Check your connection.";
    return code.replace("auth/","").replace(/-/g," ");
  }
  googleBtn.onclick = function(){
    errEl.textContent = "";
    googleBtn.disabled = true;
    window.CanonFB.loginGoogle()
      .catch(function(e){ errEl.textContent = friendlyErr((e && e.code) || String(e)); })
      .then(function(){ googleBtn.disabled = false; });
  };
  document.getElementById("logoutBtn").onclick = function(){ window.CanonFB.logout(); };

  window.CanonFB.onAuth(function(user){
    if(user){
      currentUser = user.uid;
      gate.classList.add("hide");
      var who = document.getElementById("whoami");
      if(who) who.textContent = user.email || user.displayName || "";
      ledger = {};
      Object.keys(BAKED).forEach(function(k){ tracksCache[k] = BAKED[k]; });
      loadFromCloud();
    } else {
      currentUser = null;
      gate.classList.remove("hide");
    }
  });
}
if(window.CanonFB){ wireAuth(); }
else { window.addEventListener("canonfb-ready", wireAuth); }
function setStatus(msg){
  var el = document.getElementById("status");
  if(el) el.textContent = msg || (totalDone() + "/" + TOTAL_ALBUMS + " albums");
}

/* ---------- render ---------- */
function accent(){
  for(var i=0;i<GENRES.length;i++) if(GENRES[i].id===genre) return GENRES[i].color;
  return "#E5533C";
}
function genreObj(){
  for(var i=0;i<GENRES.length;i++) if(GENRES[i].id===genre) return GENRES[i];
  return GENRES[0];
}

function render(){
  document.body.style.setProperty("--accent", accent());
  setStatus("");
  var mf = document.getElementById("meterFill");
  if(mf) mf.style.width = (totalDone()/TOTAL_ALBUMS*100)+"%";
  renderTopNav();
  var showRails = (view === "list" || view === "album");
  document.getElementById("genreNav").style.display = showRails ? "flex" : "none";
  document.getElementById("decadeNav").style.display = (view === "list") ? "flex" : "none";
  if(showRails){ renderGenres(); renderDecades(); }
  var main = document.getElementById("main");
  if(view === "hub") renderHub(main);
  else if(view === "vibes") renderVibes(main);
  else if(view === "ratings") renderRatings(main);
  else if(view === "formats") renderFormats(main);
  else if(view === "recommend") renderRecommend(main);
  else if(view === "producer") renderProducer(main);
  else if(view === "album" && current) renderAlbum(main);
  else renderList(main);
}

function renderTopNav(){
  var nav = document.getElementById("topNav"); nav.innerHTML = "";
  var items = [
    { id:"hub", label:"Hub" },
    { id:"list", label:"Crate" },
    { id:"vibes", label:"Vibes" },
    { id:"ratings", label:"Ratings" }
  ];
  items.forEach(function(it){
    var on = (it.id===view) || (it.id==="list" && view==="album");
    var b = document.createElement("button");
    b.className = "tnav" + (on ? " on" : "");
    b.textContent = it.label;
    b.onclick = function(){ view = it.id; openTrack = null; if(it.id!=="album") current = (it.id==="list"?current:null); render(); window.scrollTo(0,0); };
    nav.appendChild(b);
  });
}

function renderGenres(){
  var nav = document.getElementById("genreNav"); nav.innerHTML = "";
  GENRES.forEach(function(x){
    var b = document.createElement("button");
    b.className = "gpill" + (x.id===genre ? " on" : "");
    b.style.setProperty("--gc", x.color);
    b.innerHTML = esc(x.name) + "<small>" + genreDone(x.id) + "/" + (DECADES.length*25) + "</small>";
    b.onclick = function(){ genre=x.id; view="list"; openTrack=null; loadErr=null; render(); };
    nav.appendChild(b);
  });
}

function renderDecades(){
  var nav = document.getElementById("decadeNav"); nav.innerHTML = "";
  DECADES.forEach(function(d){
    var p = crateProgress(genre, d);
    var mark = p===25 ? " ●" : (p>0 ? " ◐" : "");
    var b = document.createElement("button");
    b.className = "dpill" + (d===decade ? " on" : "");
    b.textContent = d.slice(2) + mark;
    b.onclick = function(){ decade=d; view="list"; openTrack=null; loadErr=null; render(); };
    nav.appendChild(b);
  });
}

/* ---------- collectors for browse pages ---------- */
function allAlbums(){
  var out = [];
  GENRES.forEach(function(g){
    DECADES.forEach(function(d){
      var list = LISTS[g.id+"|"+d] || [];
      list.forEach(function(a){ out.push({ a:a, g:g, d:d }); });
    });
  });
  return out;
}
function songsForVibe(v){
  var out = [];
  allAlbums().forEach(function(rec){
    var k = akey(rec.a);
    var songs = getA(k).songs || {};
    var tr = tracksCache[k];
    Object.keys(songs).forEach(function(i){
      var s = songs[i];
      if(s && s.vibes && s.vibes.indexOf(v) >= 0){
        var title = (tr && tr[+i]) ? tr[+i] : ("Track " + (+i+1));
        out.push({ title:title, rec:rec, k:k });
      }
    });
  });
  return out;
}
function albumsForStar(n){
  var out = [];
  allAlbums().forEach(function(rec){
    if(getA(akey(rec.a)).rating === n) out.push(rec);
  });
  return out;
}
function albumsWithFlag(flag){
  var out = [];
  allAlbums().forEach(function(rec){
    if(getA(akey(rec.a))[flag]) out.push(rec);
  });
  return out;
}

function renderHub(main){
  var html = '<div class="sect-title">Browse</div><div class="hub-grid">';
  html += '<button class="hub-card" data-go="list"><h3>The Crate</h3><p>All 900 records by genre & decade</p><span class="big">' + totalDone() + '/' + TOTAL_ALBUMS + '</span></button>';
  var vibeTotal = 0;
  VIBES.forEach(function(v){ vibeTotal += songsForVibe(v).length; });
  html += '<button class="hub-card" data-go="vibes"><h3>Vibes</h3><p>Every song you\'ve tagged, by vibe</p><span class="big">' + vibeTotal + '</span></button>';
  var rated = 0;
  for(var n=1;n<=5;n++) rated += albumsForStar(n).length;
  html += '<button class="hub-card" data-go="ratings"><h3>Ratings</h3><p>Your albums by star level</p><span class="big">' + rated + '</span></button>';
  var owned = allAlbums().filter(function(rec){ var s=getA(akey(rec.a)); return s.cd||s.cassette||s.vinyl; }).length;
  html += '<button class="hub-card" data-go="formats"><h3>Collection</h3><p>Albums you own on CD, cassette & vinyl</p><span class="big">' + owned + '</span></button>';
  var recs = albumsWithFlag("recommend").length;
  html += '<button class="hub-card" data-go="recommend"><h3>Recommended</h3><p>Albums you\'d recommend</p><span class="big">' + recs + '</span></button>';
  var listened = totalDone();
  html += '<button class="hub-card" data-go="list"><h3>Listened</h3><p>Albums marked complete</p><span class="big">' + listened + '</span></button>';
  html += '</div>';

  html += '<div class="sect-title">Progress by genre</div>';
  GENRES.forEach(function(g){
    html += '<div style="padding:2px 2px 6px"><div style="display:flex;justify-content:space-between;align-items:baseline"><span style="color:' + g.color + ';font-weight:600;font-size:14px">' + esc(g.name) + '</span><span class="cnt" style="font-family:\'Space Mono\',monospace;font-size:10.5px;color:#6B6478">' + genreDone(g.id) + '/150</span></div>';
    html += '<div class="dprog">';
    DECADES.forEach(function(d){
      var p = crateProgress(g.id, d);
      html += '<div class="dprow" data-g="' + g.id + '" data-d="' + d + '"><span class="lab">' + d + '</span>' +
        '<div class="dpbar" style="--accent:' + g.color + '"><div style="width:' + (p/25*100) + '%"></div></div>' +
        '<span class="cnt">' + p + '/25</span></div>';
    });
    html += '</div></div>';
  });
  main.innerHTML = html;
  main.querySelectorAll("[data-go]").forEach(function(b){
    b.onclick = function(){ view = b.dataset.go; render(); window.scrollTo(0,0); };
  });
  main.querySelectorAll(".dprow").forEach(function(r){
    r.onclick = function(){ genre = r.dataset.g; decade = r.dataset.d; view = "list"; render(); window.scrollTo(0,0); };
  });
}

function renderVibes(main){
  var html = '<div class="sect-title">Vibes — every tagged song</div>';
  var any = false;
  VIBES.forEach(function(v){
    var songs = songsForVibe(v);
    if(!songs.length) return;
    any = true;
    html += '<div class="vibe-head"><span class="vibe-chip" style="--accent:' + accent() + '">' + esc(v) + '</span><span class="vibe-count">' + songs.length + ' song' + (songs.length>1?"s":"") + '</span></div>';
    songs.forEach(function(s){
      html += '<div class="song-row" data-k="' + esc(s.k) + '" data-g="' + s.rec.g.id + '" data-d="' + s.rec.d + '">' +
        '<span class="sng">' + esc(s.title) + '</span>' +
        '<span class="alb">' + esc(s.rec.a.album) + '</span>' +
        '<span class="gtag" style="color:' + s.rec.g.color + '">' + esc(s.rec.g.name) + ' · ' + s.rec.d + '</span></div>';
    });
  });
  if(!any) html += '<div class="empty-note">No vibes tagged yet. Open any album, expand a track, and tap a vibe pill like Groovy or Moody — tagged songs collect here automatically.</div>';
  main.innerHTML = html;
  main.querySelectorAll(".song-row").forEach(function(r){
    r.onclick = function(){ openFromBrowse(r.dataset.g, r.dataset.d, r.dataset.k); };
  });
}

function renderRatings(main){
  var html = '<div class="sect-title">Ratings</div><nav class="topnav" style="padding-left:2px">';
  for(var n=5;n>=1;n--){
    html += '<button class="tnav ' + (n===currentStar?"on":"") + '" data-star="' + n + '">' + n + '★</button>';
  }
  html += '</nav>';
  var albums = albumsForStar(currentStar);
  html += '<div class="vibe-head"><span class="vibe-count">' + albums.length + ' album' + (albums.length===1?"":"s") + ' rated ' + currentStar + ' star' + (currentStar===1?"":"s") + '</span></div>';
  if(!albums.length){
    html += '<div class="empty-note">No ' + currentStar + '-star albums yet. Open an album and tap the stars to rate it — it\'ll show up here.</div>';
  } else {
    albums.forEach(function(rec){
      var stars = "";
      for(var i=0;i<currentStar;i++) stars += "★";
      html += '<div class="star-row" data-g="' + rec.g.id + '" data-d="' + rec.d + '" data-k="' + esc(akey(rec.a)) + '">' +
        '<span class="stars-mini">' + stars + '</span>' +
        '<span class="ainfo"><span class="aname" style="font-size:14px;font-weight:600">' + esc(rec.a.album) + '</span><br><span class="aartist" style="font-size:12px;color:#9B93A8">' + esc(rec.a.artist) + '</span></span>' +
        '<span class="gtag" style="margin-left:auto;font-family:\'Space Mono\',monospace;font-size:9.5px;color:' + rec.g.color + '">' + esc(rec.g.name) + ' · ' + rec.d + '</span></div>';
    });
  }
  main.innerHTML = html;
  main.querySelectorAll("[data-star]").forEach(function(b){
    b.onclick = function(){ currentStar = +b.dataset.star; render(); };
  });
  main.querySelectorAll(".star-row").forEach(function(r){
    r.onclick = function(){ openFromBrowse(r.dataset.g, r.dataset.d, r.dataset.k); };
  });
}

function albumRow(rec, lead){
  return '<div class="star-row" data-g="' + rec.g.id + '" data-d="' + rec.d + '" data-k="' + esc(akey(rec.a)) + '">' +
    (lead ? '<span class="stars-mini">' + lead + '</span>' : '') +
    '<span class="ainfo"><span class="aname" style="font-size:14px;font-weight:600">' + esc(rec.a.album) + '</span><br><span class="aartist" style="font-size:12px;color:#9B93A8">' + esc(rec.a.artist) + '</span></span>' +
    '<span class="gtag" style="margin-left:auto;font-family:\'Space Mono\',monospace;font-size:9.5px;color:' + rec.g.color + '">' + esc(rec.g.name) + ' · ' + rec.d + '</span></div>';
}

function renderFormats(main){

    html += '<button class="tnav ' + (f.id===currentFormat?"on":"") + '" data-fmt="' + f.id + '">' + f.label + ' (' + albumsWithFlag(f.id).length + ')</button>';
  });

  if(!albums.length){
    html += '<div class="empty-note">No albums marked as owned on ' + fmtLabel + ' yet. Open an album and tap "Have on ' + fmtLabel + '" to add it here.</div>';

    albums.forEach(function(rec){ html += albumRow(rec, "◆"); });

function renderRecommend(main){
  var albums = albumsWithFlag("recommend");
  var html = '<div class="sect-title">Recommended</div>';
  html += '<div class="vibe-head"><span class="vibe-count">' + albums.length + ' album' + (albums.length===1?"":"s") + ' you\'d recommend</span></div>';
  if(!albums.length){
    html += '<div class="empty-note">No recommendations yet. Open an album and tap "Recommend" to add it here.</div>';
  } else {
    albums.forEach(function(rec){ html += albumRow(rec, "✚"); });
  }
  main.innerHTML = html;
  main.querySelectorAll(".star-row").forEach(function(r){
    r.onclick = function(){ openFromBrowse(r.dataset.g, r.dataset.d, r.dataset.k); };

function albumsByProducer(name){
  var target = String(name||"").trim().toLowerCase();
  var out = [];
  if(!target) return out;
  allAlbums().forEach(function(rec){
    var raw = (getA(akey(rec.a)).producer||"");
    var names = raw.split(",").map(function(x){ return x.trim().toLowerCase(); });
    if(names.indexOf(target) >= 0) out.push(rec);
  });
  return out;
}

function renderProducer(main){
  var albums = albumsByProducer(currentProducer);
  var html = '<button class="back" id="prodBack">‹ back to the crate</button>';
  html += '<div class="sect-title">Producer</div>';
  html += '<div class="vibe-head"><span class="vibe-chip" style="--accent:' + accent() + '">' + esc(currentProducer) + '</span><span class="vibe-count">' + albums.length + ' album' + (albums.length===1?"":"s") + '</span></div>';
  if(!albums.length){
    html += '<div class="empty-note">No other albums credited to this producer yet. Add the same producer name on other albums and they\'ll collect here.</div>';
  } else {
    albums.forEach(function(rec){ html += albumRow(rec, "●"); });
  }
  main.innerHTML = html;
  main.querySelector("#prodBack").onclick = function(){ view = "list"; render(); window.scrollTo(0,0); };
  main.querySelectorAll(".star-row").forEach(function(r){
    r.onclick = function(){ openFromBrowse(r.dataset.g, r.dataset.d, r.dataset.k); };
  });
}

function openFromBrowse(g, d, k){
  genre = g; decade = d;
  var list = LISTS[g+"|"+d] || [];
  for(var i=0;i<list.length;i++){
    if(akey(list[i]) === k){ current = list[i]; break; }
  }
  view = "album"; openTrack = null; render(); window.scrollTo(0,0);
}

function comingSoon(){
  return '<div class="errbox"><div class="errmsg">Track-by-track listing for this album isn\'t in yet — it\'s being added crate by crate. You can still mark the whole album listened, rate it, and write your review.</div></div>';
}

function renderList(main){
  var g = genreObj();
  var list = LISTS[gd()] || [];
  var done = 0, i;
  for(i=0;i<list.length;i++) if(isDone(akey(list[i]))) done++;
  var html = '<div class="crate-head"><span class="crate-title">' + esc(g.name) + " · " + decade +
    '</span><span class="crate-count">' + done + "/" + list.length + ' listened</span></div><ol>';
  for(i=0;i<list.length;i++){
    var a = list[i], k = akey(a), st = getA(k);
    var tr = tracksCache[k], heard = null;
    if(tr){ heard = 0; for(var j=0;j<tr.length;j++) if(getS(k,j).done) heard++; }
    var badge = st.rating ? "★" + st.rating : (heard!==null && heard>0 && !st.listened ? heard + "/" + tr.length : "");
    var flags = (st.cd?'<span class="cd">CD</span> ':"") + (st.cassette?'<span class="cs">CS</span> ':"") + (st.vinyl?'<span class="lp">LP</span> ':"") + (st.recommend?'<span class="rec">✚</span>':"");
    var prodBadge = "";
    if(st.producer && st.producer.trim()){
      st.producer.split(",").forEach(function(pr){
        var name = pr.trim();
        if(name) prodBadge += '<button class="prod-badge" data-prod="' + esc(name) + '">' + esc(name) + '</button>';
      });
    }
    html += '<li><div class="arow">' +
      '<button class="check ' + (st.listened?"on":"") + '" data-i="' + i + '" aria-label="Toggle listened">' + (st.listened?"✓":"") + '</button>' +
      '<button class="abtn" data-open="' + i + '"><span class="anum">' + String(i+1).padStart(2,"0") + '</span>' +
      '<span class="ainfo"><span class="aname">' + esc(a.album) + '</span><span class="ayear">(' + a.year + ')</span>' +
      (badge ? '<span class="abadge">' + esc(badge) + '</span>' : "") +
      (flags ? '<span class="fbadge">' + flags + '</span>' : "") +
      '<br><span class="aartist">' + esc(a.artist) + '</span>' + prodBadge + '</span>' +
      '<span class="chev">›</span></button></div></li>';
  }
  html += "</ol><p class='foot'>tap a record to open its tracklist · checks &amp; notes save automatically</p>";
  main.innerHTML = html;
  main.querySelectorAll(".check").forEach(function(b){
    b.onclick = function(){
      var a = list[+b.dataset.i], k = akey(a);
      patchAlbum(k, { listened: !getA(k).listened }); render();
    };
  });
  main.querySelectorAll(".abtn").forEach(function(b){
    b.onclick = function(){
      current = list[+b.dataset.open]; view = "album"; openTrack = null; loadErr = null;
      render(); ensureTracks(current);
      window.scrollTo(0,0);
    };  });
  main.querySelectorAll(".prod-badge").forEach(function(b){
    b.onclick = function(e){
      e.stopPropagation();
      currentProducer = b.dataset.prod;
      view = "producer"; openTrack = null;
      render(); window.scrollTo(0,0);
    };
  });
}

function renderAlbum(main){
  var g = genreObj();
  var a = current, k = akey(a);
  var st = getA(k);
  var tr = tracksCache[k];
  var html = '<button class="back" id="backBtn">‹ back to the crate</button>';

  var heard = 0, i;
  if(tr){ for(i=0;i<tr.length;i++) if(getS(k,i).done) heard++; }
  var full = tr && tr.length>0 && heard===tr.length;
  html += '<section class="sleeve"><div class="vinyl" aria-hidden="true"></div>' +
    '<div class="eyebrow">' + esc(g.name) + " · " + decade + '</div>' +
    '<h2>' + esc(a.album) + '</h2>' +
    '<div class="artist">' + esc(a.artist) + ' <span>(' + a.year + ')</span></div>' +
    '<div class="controls">' +
      '<button class="markall ' + ((full||st.listened)?"full":"") + '" id="markAll">' +
        ((full||st.listened) ? "✓ Listened — full album" : "Mark whole album listened") + '</button>' +
      (tr ? '<span class="count">' + heard + "/" + tr.length + ' tracks</span>' : "") +
    '</div>' +
    '<div class="stars" id="stars">' +
      [1,2,3,4,5].map(function(n){ return '<button class="star ' + (n<=st.rating?"on":"") + '" data-n="' + n + '" aria-label="Rate ' + n + ' of 5">★</button>'; }).join("") +
      '<span class="ratelabel">' + (st.rating ? st.rating + "/5" : "rate it") + '</span></div>' +
    '<textarea id="albumNotes" rows="3" placeholder="Album review — first impressions, favorite side, where you were when you heard it…">' + esc(st.notes) + '</textarea>' +
    '<input id="albumProducer" class="prod-input" type="text" placeholder="Producer(s)… (tap the badge in the crate to see all albums by them)" value="' + esc(st.producer||"") + '">' +
    '<div class="aflags">' +
      '<button class="aflag ' + (st.cd?"on":"") + '" id="flagCd"><span class="ic">' + (st.cd?"✓":"◇") + '</span>Have on CD</button>' +
      '<button class="aflag ' + (st.cassette?"on":"") + '" id="flagCassette"><span class="ic">' + (st.cassette?"✓":"◇") + '</span>Have on Cassette</button>' +
      '<button class="aflag ' + (st.vinyl?"on":"") + '" id="flagVinyl"><span class="ic">' + (st.vinyl?"✓":"◇") + '</span>Have on Vinyl</button>' +
      '<button class="aflag ' + (st.recommend?"on":"") + '" id="flagRecommend"><span class="ic">' + (st.recommend?"★":"☆") + '</span>Recommend</button>' +
    '</div>' +
  '</section>';

  if(!tr){
    html += comingSoon();
  } else {
    html += "<ol>";
    for(i=0;i<tr.length;i++){
      var t = tr[i], s = getS(k,i);
      var open = openTrack===i;
      var tagStr = ((s.rating ? s.rating + "/10" : "") + (s.vibes&&s.vibes.length ? (s.rating?"  ":"") + s.vibes.slice(0,3).join(" · ") : "") + (s.standout&&s.standout.length ? "  ✦" + s.standout.slice(0,2).join("·") : "") + (s.note ? " ✎" : "")).trim();
      html += '<li><div class="trow">' +
        '<button class="check ' + (s.done?"on":"") + '" data-t="' + i + '" aria-label="Toggle track listened">' + (s.done?"✓":"") + '</button>' +
        '<button class="tbtn" data-x="' + i + '"><span class="tnum">' + String(i+1).padStart(2,"0") + '</span>' +
        '<span class="tname ' + (s.done?"done":"") + '">' + esc(t) +
        (tagStr ? '<span class="ttags">' + esc(tagStr) + '</span>' : "") + '</span>' +
        '<span class="caret ' + (open?"open":"") + '">▾</span></button></div>';
      if(open){
        var srow = '<div class="srate"><span class="lab">Rate</span>';
        for(var r=1;r<=10;r++){
          srow += '<button class="sdot ' + ((s.rating>=r&&s.rating>0)?"on":"") + '" data-sr="' + i + '" data-rv="' + r + '">' + r + '</button>';
        }
        srow += (s.rating ? '<span class="sscore">' + s.rating + '/10</span>' : '') + '</div>';
        html += '<div class="expand">' + srow +
          '<div class="section-lab">Vibes</div><div class="vibes">' +
          VIBES.map(function(v){ return '<button class="vpill ' + (s.vibes&&s.vibes.indexOf(v)>=0?"on":"") + '" data-v="' + esc(v) + '" data-vt="' + i + '">' + v + '</button>'; }).join("") +
          '</div>' +
          '<div class="section-lab">Standout performance</div><div class="vibes">' +
          STANDOUT.map(function(sp){ return '<button class="spill ' + (s.standout&&s.standout.indexOf(sp)>=0?"on":"") + '" data-sp="' + esc(sp) + '" data-st="' + i + '">' + sp + '</button>'; }).join("") +
          '</div><div style="font-family:\'Space Mono\',monospace;font-size:10px;color:#6B6478;margin:2px 0 8px">tap to tag · collected on the Vibes page</div>' +
          '<textarea rows="2" data-nt="' + i + '" placeholder="Notes on this track…">' + esc(s.note||"") + '</textarea></div>';
      }
      html += "</li>";
    }
    html += "</ol>";
  }
  html += "<p class='foot'>checks &amp; notes save automatically</p>";
  main.innerHTML = html;

  main.querySelector("#backBtn").onclick = function(){ view="list"; openTrack=null; render(); };
  main.querySelector("#markAll").onclick = function(){
    var val = !(full||st.listened);
    var na = getA(k), base = emptyAlbum(), p;
    var out = {};
    for(p in base) out[p] = base[p];
    for(p in na) out[p] = na[p];
    var songs = {}, s0 = out.songs || {};
    for(p in s0) songs[p] = s0[p];
    if(tr){
      for(var i2=0;i2<tr.length;i2++){
        var cur = getS(k,i2), ns = {};
        for(p in cur) ns[p] = cur[p];
        ns.done = val; songs[i2] = ns;
      }
    }
    out.songs = songs; out.listened = val;
    ledger[k] = out; scheduleSave(); render();
  };
  main.querySelectorAll(".star").forEach(function(s){
    s.onclick = function(){ var n=+s.dataset.n; patchAlbum(k,{ rating: st.rating===n?0:n }); render(); };
  });
  main.querySelector("#albumNotes").oninput = function(e){ patchAlbum(k,{ notes: e.target.value }); };
  main.querySelector("#albumProducer").oninput = function(e){ patchAlbum(k,{ producer: e.target.value }); };
  main.querySelector("#flagCd").onclick = function(){ patchAlbum(k,{ cd: !getA(k).cd }); render(); };
  main.querySelector("#flagCassette").onclick = function(){ patchAlbum(k,{ cassette: !getA(k).cassette }); render(); };
  main.querySelector("#flagVinyl").onclick = function(){ patchAlbum(k,{ vinyl: !getA(k).vinyl }); render(); };
  main.querySelector("#flagRecommend").onclick = function(){ patchAlbum(k,{ recommend: !getA(k).recommend }); render(); };
  main.querySelectorAll(".check[data-t]").forEach(function(b){
    b.onclick = function(){ var i3=+b.dataset.t; patchSong(k,i3,{ done: !getS(k,i3).done }); render(); };
  });
  main.querySelectorAll(".tbtn").forEach(function(b){
    b.onclick = function(){ var i4=+b.dataset.x; openTrack = openTrack===i4 ? null : i4; render(); };
  });
  main.querySelectorAll(".sdot").forEach(function(d){
    d.onclick = function(){
      var i6=+d.dataset.sr, rv=+d.dataset.rv, cur=getS(k,i6).rating||0;
      patchSong(k,i6,{ rating: cur===rv ? 0 : rv }); render();
    };
  });
  main.querySelectorAll(".vpill").forEach(function(pl){
    pl.onclick = function(){
      var i5=+pl.dataset.vt, v=pl.dataset.v, cur=getS(k,i5).vibes||[];
      var next = cur.indexOf(v)>=0 ? cur.filter(function(x){ return x!==v; }) : cur.concat([v]);
      patchSong(k,i5,{ vibes: next }); render();
    };
  });
  main.querySelectorAll(".spill").forEach(function(pl){
    pl.onclick = function(){
      var i7=+pl.dataset.st, sp=pl.dataset.sp, cur=getS(k,i7).standout||[];
      var next = cur.indexOf(sp)>=0 ? cur.filter(function(x){ return x!==sp; }) : cur.concat([sp]);
      patchSong(k,i7,{ standout: next }); render();
    };
  });
  main.querySelectorAll("textarea[data-nt]").forEach(function(t){
    t.oninput = function(e){ patchSong(k,+t.dataset.nt,{ note: e.target.value }); };
  });
}

/* draw immediately with built-in data, then load saved progress */
try { render(); } catch(e) {
  document.body.insertAdjacentHTML("beforeend", "<pre style='color:#E5533C;padding:16px;white-space:pre-wrap'>" + e.message + "</pre>");
}
